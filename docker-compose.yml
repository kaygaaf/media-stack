# Media Server Stack for Coolify
# Services: Jellyfin, Sonarr, Radarr, Prowlarr, qBittorrent, Bazarr, Seerr
# Proxy: Use Coolify's built-in nginx (no Caddy needed)
# Set env vars in Coolify domain config for each service URL

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
    volumes:
      - ./jellyfin:/config
      - ./media:/media
    ports:
      - "8096:8096"
    restart: unless-stopped
    networks:
      - proxy

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - SONARR_APPLICATION_URL=${SONARR_URL}
    volumes:
      - ./sonarr:/config
      - ./media:/media
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - qbittorrent

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - RADARR_APPLICATION_URL=${RADARR_URL}
    volumes:
      - ./radarr:/config
      - ./media:/media
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - qbittorrent

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./prowlarr:/config
      - ./media:/media
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - proxy

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - "9080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - proxy

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - BAZARR_APPLICATION_URL=${BAZARR_URL}
    volumes:
      - ./bazarr:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - SEERR_APPLICATION_URL=${SEERR_URL}
    volumes:
      - ./seerr:/app/config
    ports:
      - "4535:4535"
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - jellyfin

networks:
  proxy:
    driver: bridge
