# Media Server Stack for Coolify
# Using host network - services communicate over localhost
# Env vars hardcoded per service (Coolify SERVICE_URL_* mechanism broken for prebuilt images)

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - JELLYFIN_PublishedServerUrl=https://jf.vandijk.one/
    volumes:
      - ./jellyfin:/config
      - ./media:/media
    ports:
      - "8096:8096"
    restart: unless-stopped
    network_mode: host

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./sonarr:/config
      - ./media:/media
    ports:
      - "8989:8989"
    restart: unless-stopped
    network_mode: host

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./radarr:/config
      - ./media:/media
    ports:
      - "7878:7878"
    restart: unless-stopped
    network_mode: host

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./prowlarr:/config
      - ./media:/media
    ports:
      - "9696:9696"
    restart: unless-stopped
    network_mode: host

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - "9080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    network_mode: host

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./bazarr:/config
      - ./media:/media
    ports:
      - "6767:6767"
    restart: unless-stopped
    network_mode: host

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./seerr:/app/config
    ports:
      - "4535:4535"
    restart: unless-stopped
    network_mode: host
