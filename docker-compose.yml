# Media Server Stack for Coolify
# Jellyfin + Sonarr + Radarr + Prowlarr + qBittorrent + Bazarr + Seerr + Caddy

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy_data:/data
    restart: unless-stopped
    networks:
      - proxy
    command: >
      sh -c "cat > /etc/caddy/Caddyfile << 'EOF'
      {$JELLYFIN_DOMAIN} { reverse_proxy jellyfin:8096 }
      {$SONARR_DOMAIN} { reverse_proxy sonarr:8989 }
      {$RADARR_DOMAIN} { reverse_proxy radarr:7878 }
      {$PROWLARR_DOMAIN} { reverse_proxy prowlarr:9696 }
      {$QBITTORRENT_DOMAIN} { reverse_proxy qbittorrent:9080 }
      {$BAZARR_DOMAIN} { reverse_proxy bazarr:6767 }
      {$SEERR_DOMAIN} { reverse_proxy seerr:4535 }
      EOF
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}
    volumes:
      - ./jellyfin:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "8096:8096"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./sonarr:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - qbittorrent

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./radarr:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - qbittorrent

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./prowlarr:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "9080:8080"
      - "6881:6881"
      - "6881:6881/udp"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./bazarr:/config
      - ./media:/media
    restart: unless-stopped
    networks:
      - proxy

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - ./seerr:/app/config
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - jellyfin

networks:
  proxy:
    driver: bridge
