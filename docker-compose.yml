# Media Server Stack for Coolify
# Multi-service with separate domains per service
# Key: bridge network + coolify external network (NOT host mode)

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./jellyfin:/config
      - ./media:/media
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./sonarr:/config
      - ./media:/media
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify
    depends_on:
      - qbittorrent

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./radarr:/config
      - ./media:/media
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify
    depends_on:
      - qbittorrent

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./prowlarr:/config
      - ./media:/media
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./bazarr:/config
      - ./media:/media
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./seerr:/app/config
    restart: unless-stopped
    network_mode: bridge
    networks:
      - coolify
    depends_on:
      - jellyfin

networks:
  coolify:
    name: coolify
    external: true
